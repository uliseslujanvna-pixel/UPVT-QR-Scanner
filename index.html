<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UPVT · Lista de asistencia QR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__id">
      <img src="assets/logo.png" alt="" class="topbar__logo" onerror="this.style.display='none'">
      <div>
        <p class="topbar__title">Lista de asistencia</p>
        <p class="topbar__sub" id="contextLabel">Cargando reserva…</p>
      </div>
    </div>
    <div class="topbar__status" id="connStatus" data-state="checking">
      <span class="dot"></span><span class="txt">Conectando</span>
    </div>
  </header>

  <main class="stage">

    <section class="camera-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas" hidden></canvas>

      <div class="frame" id="frame">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <span class="scanline"></span>
      </div>

      <button id="switchCam" class="icon-btn cam-toggle" title="Cambiar cámara" aria-label="Cambiar cámara">⟳</button>
    </section>

    <section class="result" id="resultCard" data-state="idle">
      <p class="result__eyebrow" id="resultState">Apunta la cámara a la credencial</p>
      <p class="result__name" id="resultName">—</p>
      <p class="result__meta" id="resultMeta">&nbsp;</p>
    </section>

    <footer class="counter-bar">
      <div class="counter">
        <span class="counter__num" id="counterNum">0</span>
        <span class="counter__label">registrados</span>
      </div>
      <button id="manualBtn" class="text-btn">Ingresar matrícula manualmente</button>
    </footer>

  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="scanner.js"></script>
</body>
</html>
