<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba API</title>
</head>

<body>

<h1>Prueba API Apps Script</h1>

<button onclick="probarAPI()">
Probar conexión
</button>

<pre id="resultado"></pre>

<script>

async function probarAPI(){

const url="https://script.google.com/macros/s/AKfycbwlILgqyqL7rejSvtIV9qL7qLzCAkeVuIrZLhmpJz8VpPGtPohaoECnCrfUBOUb3GJL7Q/exec";

try{

const response=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify({
accion:"ping"
})
});

const texto=await response.text();

document.getElementById("resultado").textContent=texto;

}catch(error){

document.getElementById("resultado").textContent=error;

console.error(error);

}

}

</script>

</body>
</html>
