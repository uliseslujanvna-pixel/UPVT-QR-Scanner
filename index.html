<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba de Cámara</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

video{
    width:90%;
    max-width:700px;
    margin-top:20px;
    border-radius:15px;
    border:4px solid #00b894;
}
</style>

</head>

<body>

<h1>Prueba de Cámara</h1>

<video id="video" autoplay playsinline></video>

<script>

async function iniciar(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        document.getElementById("video").srcObject = stream;

        console.log("Cámara funcionando");

    }catch(error){

        alert(error.message);

        console.error(error);

    }

}

iniciar();

</script>

</body>
</html>
